<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>आधार रिपोर्ट 40068 | पर्पल & ग्रीन 3D</title>
    
    <!-- Google Fonts - Poppins आणि Majestic साठी -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Poppins फॉन्ट -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Majestic फॉन्ट (Playfair Display चा वापर करू - हा Majestic सारखाच आहे) -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body {
            /* Poppins मुख्य फॉन्ट म्हणून */
            font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 0% 0%, #1a0f2e, #0a1f1a, #0a0a1f);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            perspective: 1200px;
            position: relative;
        }

        /* Majestic फॉन्ट फक्त हेडिंग आणि खास टेक्स्टसाठी */
        h1, .report-badge, .majestic-text {
            font-family: 'Playfair Display', 'Times New Roman', serif;
            font-weight: 800;
        }

        /* फुल स्क्रीन 3D बॅकग्राउंड */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(128, 0, 255, 0.05) 0px,
                rgba(128, 0, 255, 0.05) 20px,
                rgba(0, 255, 0, 0.05) 20px,
                rgba(0, 255, 0, 0.05) 40px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* मुख्य कंटेनर - फुल स्क्रीन फिट */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding: 10px;
        }

        /* 3D सीन */
        .scene {
            position: relative;
            width: 100%;
            transform-style: preserve-3d;
            animation: sceneFloat 15s infinite alternate ease-in-out;
        }

        @keyframes sceneFloat {
            0% { transform: perspective(1200px) rotateY(-3deg) rotateX(2deg) translateZ(0); }
            100% { transform: perspective(1200px) rotateY(3deg) rotateX(-2deg) translateZ(20px); }
        }

        /* मुख्य कार्ड */
        .card {
            background: rgba(20, 10, 30, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            padding: clamp(20px, 5vw, 50px) clamp(20px, 4vw, 40px);
            box-shadow: 
                0 30px 50px rgba(0, 0, 0, 0.6),
                0 0 0 2px rgba(128, 0, 255, 0.3) inset,
                0 0 30px rgba(0, 255, 0, 0.2),
                0 20px 40px rgba(128, 0, 255, 0.3);
            border: 1px solid rgba(0, 255, 0, 0.2);
            transform-style: preserve-3d;
            transform: translateZ(30px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            width: 100%;
            margin: 0 auto;
        }

        .card:hover {
            transform: translateZ(50px) scale(1.02);
            box-shadow: 
                0 40px 70px rgba(0, 0, 0, 0.8),
                0 0 0 3px rgba(128, 0, 255, 0.5) inset,
                0 0 50px rgba(0, 255, 0, 0.4),
                0 30px 60px rgba(128, 0, 255, 0.4);
        }

        /* पर्पल-ग्रीन ग्रेडियंट लेयर्स */
        .card::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 15px;
            right: -15px;
            bottom: -15px;
            background: linear-gradient(135deg, #8a2be2, #00ff00, #4b0082);
            border-radius: 50px;
            z-index: -1;
            opacity: 0.4;
            filter: blur(12px);
            transform: translateZ(-25px);
            transition: all 0.5s ease;
            animation: gradientShift 8s infinite alternate;
        }

        @keyframes gradientShift {
            0% { opacity: 0.3; filter: blur(15px); }
            100% { opacity: 0.6; filter: blur(20px); }
        }

        .card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 40%, rgba(128,0,255,0.2), rgba(0,255,0,0.1), transparent 70%);
            border-radius: 50px;
            pointer-events: none;
            z-index: 1;
        }

        /* 3D लोगो कंटेनर */
        .logo-wrapper {
            position: relative;
            width: min(180px, 35vw);
            height: min(180px, 35vw);
            margin: 0 auto clamp(15px, 4vh, 30px);
            transform-style: preserve-3d;
        }

        .logo-3d {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: logoSpin 10s infinite cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes logoSpin {
            0%, 100% { transform: rotateY(0deg) rotateX(10deg) translateZ(20px); }
            25% { transform: rotateY(90deg) rotateX(20deg) translateZ(40px); }
            50% { transform: rotateY(180deg) rotateX(10deg) translateZ(20px); }
            75% { transform: rotateY(270deg) rotateX(0deg) translateZ(40px); }
        }

        .logo-face {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            backface-visibility: hidden;
        }

        .logo-front {
            background: linear-gradient(135deg, #8a2be2, #9370db, #4b0082);
            transform: translateZ(25px);
            box-shadow: 
                0 0 30px #8a2be2,
                0 0 60px #00ff00,
                inset 0 0 20px rgba(255,255,255,0.5);
            border: 2px solid #00ff00;
        }

        .logo-front span {
            font-size: min(80px, 15vw);
            filter: drop-shadow(0 0 20px #00ff00);
            animation: pulse 2s infinite;
            font-family: 'Poppins', sans-serif; /* Poppins for the icon text */
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .logo-back {
            background: linear-gradient(135deg, #00ff00, #32cd32, #228b22);
            transform: rotateY(180deg) translateZ(25px);
            box-shadow: 
                0 0 30px #00ff00,
                0 0 60px #8a2be2,
                inset 0 0 20px rgba(255,255,255,0.5);
            border: 2px solid #8a2be2;
        }

        .logo-back span {
            font-size: min(80px, 15vw);
            color: #8a2be2;
            filter: drop-shadow(0 0 20px #8a2be2);
            font-family: 'Poppins', sans-serif;
        }

        /* फ्लोटिंग रिंग्स */
        .rings {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            transform-style: preserve-3d;
        }

        .ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 3px solid;
            border-radius: 50%;
            border-top-color: #8a2be2;
            border-bottom-color: #00ff00;
            border-left-color: transparent;
            border-right-color: transparent;
            animation: ringRotate 6s infinite linear;
        }

        .ring:nth-child(2) {
            width: 115%;
            height: 115%;
            top: -7.5%;
            left: -7.5%;
            border-top-color: #00ff00;
            border-bottom-color: #8a2be2;
            border-left-color: transparent;
            border-right-color: transparent;
            animation-direction: reverse;
            animation-duration: 4s;
        }

        @keyframes ringRotate {
            0% { transform: rotateZ(0deg) rotateX(60deg) translateZ(10px); }
            100% { transform: rotateZ(360deg) rotateX(60deg) translateZ(10px); }
        }

        /* टेक्स्ट स्टाइलिंग - Poppins + Majestic कॉम्बो */
        h1 {
            font-family: 'Playfair Display', 'Times New Roman', serif; /* Majestic effect */
            color: #fff;
            font-size: clamp(28px, 6vw, 48px);
            margin-bottom: clamp(5px, 2vh, 15px);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: clamp(1px, 1vw, 4px);
            text-shadow: 
                0 2px 0 #8a2be2,
                0 4px 0 #00ff00,
                0 6px 15px rgba(0,0,0,0.5);
            transform: translateZ(30px);
            word-break: break-word;
            font-style: italic; /* Majestic ला italic छान दिसतो */
        }

        .report-badge {
            font-family: 'Playfair Display', 'Times New Roman', serif; /* Majestic effect */
            font-size: clamp(32px, 7vw, 52px);
            font-weight: 900;
            background: linear-gradient(135deg, #8a2be2, #00ff00, #9370db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 
                0 0 30px #8a2be2,
                0 0 60px #00ff00;
            margin-bottom: clamp(15px, 4vh, 25px);
            letter-spacing: clamp(2px, 2vw, 6px);
            transform: translateZ(35px);
            display: inline-block;
            padding: 0 clamp(10px, 3vw, 25px);
            position: relative;
            font-style: italic;
        }

        .report-badge::before,
        .report-badge::after {
            content: '⚡';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #00ff00;
            font-size: clamp(20px, 5vw, 35px);
            text-shadow: 0 0 20px #8a2be2;
            animation: spark 1.5s infinite;
            font-family: 'Poppins', sans-serif; /* Poppins for icons */
        }

        @keyframes spark {
            0%, 100% { opacity: 0.5; transform: translateY(-50%) scale(1); }
            50% { opacity: 1; transform: translateY(-50%) scale(1.2); }
        }

        .report-badge::before {
            left: -5px;
        }

        .report-badge::after {
            right: -5px;
        }

        .description-box {
            color: #e0e0e0;
            font-size: clamp(16px, 4vw, 20px);
            margin-bottom: clamp(20px, 5vh, 40px);
            line-height: 1.8;
            padding: clamp(12px, 3vh, 20px) clamp(15px, 4vw, 30px);
            transform: translateZ(25px);
            background: rgba(138, 43, 226, 0.15);
            border-radius: 60px;
            border-left: 4px solid #8a2be2;
            border-right: 4px solid #00ff00;
            box-shadow: 0 0 30px rgba(0,255,0,0.2);
            width: 100%;
            word-break: break-word;
            font-family: 'Poppins', sans-serif; /* Poppins for description */
            font-weight: 400;
        }

        /* 3D बटन */
        .button-3d {
            transform-style: preserve-3d;
            margin: clamp(20px, 5vh, 40px) 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #8a2be2, #9370db, #00ff00);
            color: white;
            text-decoration: none;
            padding: clamp(15px, 4vw, 22px) clamp(30px, 8vw, 60px);
            border-radius: 60px;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 700;
            letter-spacing: 2px;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 
                0 15px 25px rgba(0,0,0,0.5),
                0 8px 0 #4b0082,
                0 12px 20px rgba(138,43,226,0.4),
                0 0 30px rgba(0,255,0,0.3);
            transform: translateZ(40px) translateY(-5px);
            text-transform: uppercase;
            width: auto;
            min-width: min(280px, 80%);
            max-width: 90%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            position: relative;
            font-family: 'Poppins', sans-serif; /* Poppins for button */
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .btn {
                white-space: normal;
                font-size: 20px;
                padding: 15px 25px;
            }
        }

        .btn:hover {
            transform: translateZ(60px) translateY(-10px);
            box-shadow: 
                0 25px 35px rgba(0,0,0,0.6),
                0 12px 0 #4b0082,
                0 20px 30px rgba(138,43,226,0.6),
                0 0 50px rgba(0,255,0,0.5);
            background: linear-gradient(135deg, #9b4dff, #a47eff, #1aff1a);
        }

        .btn:active {
            transform: translateZ(30px) translateY(0);
            box-shadow: 
                0 10px 20px rgba(0,0,0,0.5),
                0 4px 0 #4b0082,
                0 15px 25px rgba(138,43,226,0.4);
        }

        /* सिक्युरिटी बॅज */
        .security-grid {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 3vw, 30px);
            margin-top: clamp(20px, 5vh, 35px);
            padding-top: clamp(15px, 4vh, 30px);
            border-top: 2px solid;
            border-image: linear-gradient(90deg, #8a2be2, #00ff00, #8a2be2) 1;
            transform-style: preserve-3d;
            flex-wrap: wrap;
        }

        .security-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: clamp(14px, 3.5vw, 18px);
            font-weight: 500; /* Poppins medium */
            padding: clamp(8px, 2vh, 12px) clamp(12px, 3vw, 22px);
            background: rgba(138, 43, 226, 0.2);
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            transform: translateZ(25px);
            transition: all 0.3s;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
            font-family: 'Poppins', sans-serif;
        }

        .security-item:hover {
            transform: translateZ(35px) scale(1.05);
            background: rgba(138, 43, 226, 0.3);
            border-color: #8a2be2;
            box-shadow: 0 0 30px rgba(138,43,226,0.4);
        }

        .security-item i {
            font-size: clamp(18px, 4vw, 24px);
            filter: drop-shadow(0 0 10px #00ff00);
            font-family: 'Poppins', sans-serif;
        }

        .footer-note {
            margin-top: clamp(15px, 4vh, 30px);
            color: rgba(0, 255, 0, 0.7);
            font-size: clamp(12px, 3vw, 16px);
            transform: translateZ(20px);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #8a2be2;
            word-break: break-word;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
        }

        /* 3D फ्लोटिंग एलिमेंट्स */
        .floating-elements {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .float-3d {
            position: absolute;
            width: clamp(30px, 8vw, 80px);
            height: clamp(30px, 8vw, 80px);
            background: linear-gradient(135deg, rgba(138,43,226,0.2), rgba(0,255,0,0.2));
            border: 2px solid rgba(0,255,0,0.3);
            transform-style: preserve-3d;
            animation: floatAround 20s infinite linear;
            border-radius: 20px;
            backdrop-filter: blur(3px);
        }

        .float-3d:nth-child(1) {
            top: 10%;
            left: 5%;
            animation-duration: 25s;
        }
        .float-3d:nth-child(2) {
            bottom: 15%;
            right: 8%;
            width: clamp(40px, 10vw, 100px);
            height: clamp(40px, 10vw, 100px);
            animation-duration: 18s;
            animation-delay: -5s;
        }
        .float-3d:nth-child(3) {
            top: 20%;
            right: 15%;
            animation-duration: 22s;
            animation-delay: -10s;
        }
        .float-3d:nth-child(4) {
            bottom: 25%;
            left: 10%;
            animation-duration: 28s;
            animation-delay: -15s;
        }

        @keyframes floatAround {
            0% { transform: rotateX(0deg) rotateY(0deg) translateZ(0) translate(0, 0); }
            33% { transform: rotateX(120deg) rotateY(90deg) translateZ(100px) translate(20px, -30px); }
            66% { transform: rotateX(240deg) rotateY(180deg) translateZ(50px) translate(-30px, 20px); }
            100% { transform: rotateX(360deg) rotateY(360deg) translateZ(0) translate(0, 0); }
        }

        /* रेस्पॉन्सिव्ह फिक्सेस */
        @media (max-width: 768px) {
            .card {
                border-radius: 35px;
            }
            
            .security-item {
                width: calc(50% - 10px);
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .card {
                border-radius: 30px;
                padding: 20px 15px;
            }
            
            .security-item {
                width: 100%;
            }
            
            .report-badge::before,
            .report-badge::after {
                display: none;
            }
            
            h1 {
                font-style: normal; /* मोबाईलवर italic काढू शकतो */
            }
        }

        /* स्क्रीन फिट सुनिश्चित करण्यासाठी */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
                padding-top: max(10px, env(safe-area-inset-top));
                padding-bottom: max(10px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <!-- फ्लोटिंग 3D एलिमेंट्स -->
    <div class="floating-elements">
        <div class="float-3d"></div>
        <div class="float-3d"></div>
        <div class="float-3d"></div>
        <div class="float-3d"></div>
    </div>

    <div class="container">
        <div class="scene">
            <div class="card">
                <!-- 3D लोगो -->
                <div class="logo-wrapper">
                    <div class="logo-3d">
                        <div class="logo-face logo-front">
                            <span>🆔</span>
                        </div>
                        <div class="logo-face logo-back">
                            <span>🇮🇳</span>
                        </div>
                    </div>
                    <div class="rings">
                        <div class="ring"></div>
                        <div class="ring"></div>
                    </div>
                </div>

                <!-- मुख्य मजकूर - Majestic Font मध्ये -->
                <h1>आधार रिपोर्ट</h1>
                <div class="report-badge">#40068</div>

                <!-- Poppins Font मध्ये डिस्क्रिप्शन -->
                <div class="description-box">
                    <span style="color: #8a2be2; font-family: 'Poppins';">⬤</span> 
                    तुमचा प्रीमियम आधार रिपोर्ट पाहण्यासाठी 
                    <span style="color: #00ff00; font-family: 'Poppins'; font-weight: 600;">ग्रीन बटन</span> वर क्लिक करा
                    <span style="color: #00ff00; font-family: 'Poppins';">⬤</span>
                </div>

                <!-- 3D बटन - Poppins Font मध्ये -->
                <div class="button-3d">
                    <a href="https://script.google.com/macros/s/AKfycbwcA3VwnNmdq9yOracT5YJGklULOxKVZtbVlXEgdZ8GcPLfxAcPsHsh_EkAeWRkICLh/exec" 
                       class="btn">
                        📄 रिपोर्ट उघडा
                    </a>
                </div>

                <!-- सिक्युरिटी बॅजेस - Poppins Font मध्ये -->
                <div class="security-grid">
                    <div class="security-item">
                        <i>🔒</i> पर्पल सिक्योर
                    </div>
                    <div class="security-item">
                        <i>🌿</i> ग्रीन एन्क्रिप्ट
                    </div>
                    <div class="security-item">
                        <i>⚡</i> 3D वेरिफाइड
                    </div>
                    <div class="security-item">
                        <i>🛡️</i> ड्युअल प्रोटेक्ट
                    </div>
                </div>

                <!-- फूटर - Poppins Light -->
                <div class="footer-note">
                    ⚡ पर्पल & ग्रीन 3D | Poppins ✦ Majestic ⚡
                </div>
            </div>
        </div>
    </div>

    <!-- स्क्रीन साइझ डिटेक्शन -->
    <script>
        function adjustForScreen() {
            const vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        
        window.addEventListener('resize', adjustForScreen);
        window.addEventListener('orientationchange', adjustForScreen);
        adjustForScreen();
    </script>
</body>
</html>
